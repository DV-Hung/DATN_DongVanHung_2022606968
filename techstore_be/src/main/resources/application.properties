spring.application.name=techstore

# ===== 1. DATABASE CONNECTION =====
# OPTION 1: Local MySQL (Development)
# spring.datasource.url=jdbc:mysql://localhost:3306/techstoredb
# spring.datasource.username=${LOCAL_DB_USERNAME}
# spring.datasource.password=${LOCAL_DB_PASSWORD}

# OPTION 2: Aiven Cloud MySQL (Production/Cloud)
# Using individual environment variables from .env.local for flexibility & security
spring.datasource.url=jdbc:mysql://${AIVEN_DB_HOST:localhost}:${AIVEN_DB_PORT:3306}/${AIVEN_DB_NAME:techstoredb}?serverTimezone=UTC&useSSL=true&trustServerCertificate=true
spring.datasource.username=${AIVEN_DB_USERNAME}
spring.datasource.password=${AIVEN_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# 2. JPA / Hibernate Properties
# 'update' giúp tự động tạo/sửa bảng dựa trên Entity Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 7+ auto-detects dialect from JDBC URL
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== CONNECTION POOL (HikariCP) =====
# Cấu hình cho kết nối đến cloud database
spring.datasource.hikari.maximum-pool-size=${DB_HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000

# 3. Server Port & Context Path
server.port=8080

# 4. Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# 5. JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# 6. Logging Configuration
logging.level.root=INFO

# 7. CORS Configuration
cors.allowedOrigins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowedHeaders=Content-Type,Authorization,X-Requested-With,Accept,Origin
cors.allowCredentials=true
cors.maxAge=3600
logging.level.com.haui.techstore=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Logging kết nối database
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc.datasource=DEBUG

# 7. OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
# Swagger UI enhancements
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.use-root-path=true
# Show Bearer Token authorization button
springdoc.swagger-ui.persist-authorization=true