spring.application.name=techstore

# ===== TEST DATABASE - H2 In-Memory =====
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 Console (for debugging) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate Properties =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===== Connection Pool =====
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== Server Port =====
server.port=8080

# ===== Cloudinary Configuration (dummy values for tests) =====
cloudinary.cloud-name=dummy
cloudinary.api-key=dummy
cloudinary.api-secret=dummy

# ===== JWT Configuration (dummy values for tests) =====
jwt.secret=test-secret-key-for-testing-purposes
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===== Flyway Configuration =====
spring.flyway.enabled=false

# ===== Logging Configuration =====
logging.level.root=WARN
logging.level.com.haui.techstore=DEBUG
